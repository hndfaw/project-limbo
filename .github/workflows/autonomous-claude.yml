name: Autonomous Claude

on:
  schedule:
    # True 45-minute cadence. A single "*/45" cron runs at :00 and :45,
    # which alternates 45-minute and 15-minute gaps, so three crons are
    # interleaved to keep an even 45-minute spacing across the day.
    - cron: "0,45 0-23/3 * * *"
    - cron: "30 1-23/3 * * *"
    - cron: "15 2-23/3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-claude-main
  cancel-in-progress: false

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Either credential works. Prefer CLAUDE_CODE_OAUTH_TOKEN (from a Claude
      # subscription via `claude setup-token`) to avoid metered API billing;
      # ANTHROPIC_API_KEY (from console.anthropic.com) is the alternative.
      ANTHROPIC_API_KEY_SET: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      CLAUDE_OAUTH_SET: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require Claude credentials
        if: ${{ env.ANTHROPIC_API_KEY_SET != 'true' && env.CLAUDE_OAUTH_SET != 'true' }}
        run: |
          echo "::error title=Missing Claude credentials::Autonomous Claude is enabled, but neither CLAUDE_CODE_OAUTH_TOKEN nor ANTHROPIC_API_KEY is set. Add one under Settings > Secrets and variables > Actions > Repository secrets, then rerun this workflow."
          exit 1

      - name: Baseline tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Autonomous implementation pass
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are maintaining Project Limbo autonomously in a CI runner.

            Run `PYTHONPATH=src python -m unittest discover -s tests` first.
            If tests fail, only fix the failing pipeline and stop.
            If tests pass, inspect the open GitHub issues with
            `gh issue list --state open`, choose the next logical unblocked
            issue, and implement it with focused, production-grade code and
            exhaustive tests. Follow the existing code style. Then run the full
            test suite again and make sure it is green.

            Do NOT run any `git commit`, `git push`, or `git config` command and
            do NOT open a pull request. Leave your work as uncommitted changes in
            the working tree. A later workflow step verifies the tests and
            commits the diff. Do not remove existing user work.
          claude_args: |
            --max-turns 40
            --allowedTools Bash,Read,Write,Edit,Grep,Glob

      - name: Verify after Claude
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Commit autonomous changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "limbo-autonomous"
            git config user.email "limbo-autonomous@users.noreply.github.com"
            git add -A
            git commit -m "Autonomous Claude maintenance"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
