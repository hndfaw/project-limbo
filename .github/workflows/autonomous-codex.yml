name: Autonomous Codex

on:
  schedule:
    # True 45-minute cadence. A single "*/45" cron runs at :00 and :45,
    # which alternates 45-minute and 15-minute gaps.
    - cron: "0,45 0-23/3 * * *"
    - cron: "30 1-23/3 * * *"
    - cron: "15 2-23/3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-codex-main
  cancel-in-progress: false

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_KEY_SET: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Require OpenAI API key
        if: ${{ env.OPENAI_API_KEY_SET != 'true' }}
        run: |
          echo "::error title=Missing OPENAI_API_KEY::Autonomous Codex is enabled, but the repository secret OPENAI_API_KEY is not set. Add it under Settings > Secrets and variables > Actions > Repository secrets, then rerun this workflow."
          exit 1

      - name: Baseline tests
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Autonomous implementation pass
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          help="$(codex exec --help)"
          args=(exec --cd "$GITHUB_WORKSPACE")

          if grep -q -- "--sandbox" <<< "$help"; then
            args+=(--sandbox workspace-write)
          fi

          if grep -q -- "--ask-for-approval" <<< "$help"; then
            args+=(--ask-for-approval never)
          elif grep -q -- "--approval-policy" <<< "$help"; then
            args+=(--approval-policy never)
          fi

          if grep -q -- "--search" <<< "$help"; then
            args+=(--search)
          fi

          args+=("You are maintaining Project Limbo autonomously. First run the tests. If tests fail, only fix the failing pipeline. If tests pass, inspect open GitHub issues, choose the next logical unblocked issue, implement it with focused code and exhaustive tests, then run the full test suite. Do not remove user work. Keep changes production-grade and commit-ready.")

          codex "${args[@]}"

      - name: Verify after Codex
        run: PYTHONPATH=src python -m unittest discover -s tests

      - name: Commit autonomous changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "codex-autonomous"
            git config user.email "codex-autonomous@users.noreply.github.com"
            git add -A
            git commit -m "Autonomous Codex maintenance"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
